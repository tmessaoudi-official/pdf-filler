<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>PDF Fill & Sign</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .toolbar {
      padding: 7px 12px;
      background: #f8f9fa;
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .toolbar-row1 {
      border-bottom: 1px solid #e2e8f0;
    }
    .toolbar-row2 {
      border-bottom: 1px solid #dee2e6;
      background: #f0f4f8;
    }
    .toolbar-group {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .toolbar-sep {
      width: 1px;
      height: 22px;
      background: #dee2e6;
      flex-shrink: 0;
    }
    .toolbar-select {
      padding: 4px 6px;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      font-size: 12px;
      background: white;
      cursor: pointer;
    }
    .toolbar-number {
      width: 50px;
      padding: 4px 5px;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
    .page-input { width: 42px; }
    .page-total { font-size: 12px; color: #555; white-space: nowrap; }
    .toolbar-color {
      width: 30px;
      height: 26px;
      padding: 1px;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      cursor: pointer;
    }
    .zoom-display {
      font-size: 12px;
      font-weight: 600;
      min-width: 38px;
      text-align: center;
    }
    .btn-icon {
      padding: 4px 8px;
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      color: #333;
      cursor: pointer;
      font-size: 13px;
      min-width: 28px;
      transition: background 0.15s;
    }
    .btn-icon:hover:not(:disabled) { background: #e9ecef; }
    .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-italic { font-style: italic; }
    .btn-sm { padding: 4px 8px; font-size: 12px; }
    .btn-active-fmt {
      background: #2563eb !important;
      color: white !important;
      border-color: #2563eb !important;
    }
    .mode-badge {
      margin-left: auto;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      background: #e2e8f0;
      color: #475569;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }
    .mode-badge.active {
      background: #2563eb;
      color: white;
    }
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* Touch: show controls when element is selected (hover doesn't fire on mobile) */
    .pdf-element.selected .element-controls { opacity: 1; }
    /* Touch: prevent container scroll while dragging an element */
    .pdf-element { touch-action: none; }
    /* Signature canvas fills its container, JS sets intrinsic size */
    #signatureCanvas { width: 100%; max-width: 500px; display: block; }

    /* ── Mobile responsive ─────────────────────────────────── */
    @media (max-width: 640px) {
      body { padding: 0; }
      .container {
        border-radius: 0;
        box-shadow: none;
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      .header { padding: 10px 16px; }
      .header h1 { font-size: 16px; }
      .toolbar { padding: 6px 8px; gap: 5px; }
      /* Minimum 40px touch targets for all interactive toolbar elements */
      .btn-icon {
        min-width: 40px;
        min-height: 40px;
        padding: 8px 6px;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn { min-height: 40px; padding: 8px 10px; font-size: 13px; }
      .btn-sm { min-height: 36px; }
      .toolbar-color { width: 36px; height: 36px; }
      .toolbar-number { width: 40px; padding: 4px 2px; }
      .page-input { width: 36px; }
      .page-total { display: none; }
      .zoom-display { min-width: 28px; }
      .mode-badge { font-size: 10px; padding: 3px 7px; }
      /* Canvas container fills remaining space */
      .canvas-container {
        flex: 1;
        min-height: 0;
        padding: 8px;
        max-height: none;
      }
      /* Larger resize handle for fat-finger accuracy */
      .resize-handle { width: 22px; height: 22px; bottom: -8px; right: -8px; }
      /* Larger delete button */
      .control-btn { width: 36px; height: 36px; font-size: 16px; }
      .element-controls { top: -42px; gap: 6px; }
      /* Toast at top — bottom is hidden by soft keyboard */
      #toast {
        bottom: auto;
        top: 16px;
        right: auto;
        left: 50%;
        transform: translateX(-50%) translateY(-8px);
        white-space: nowrap;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      /* Compact signature modal */
      .signature-content { padding: 14px; }
    }
    /* ── End mobile ─────────────────────────────────────────── */

    #pdfCanvas.cursor-default { cursor: default; }
    #pdfCanvas.cursor-crosshair { cursor: crosshair; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn-secondary {
      background: #6c757d;
      color: white;
    }
    .btn-secondary:hover {
      background: #5a6268;
    }
    .btn-success {
      background: #10b981;
      color: white;
    }
    .btn-success:hover {
      background: #059669;
    }
    .btn.active {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    input[type="file"] {
      display: none;
    }
    .canvas-container {
      position: relative;
      overflow: auto;
      max-height: calc(100vh - 300px);
      padding: 20px;
      background: #e9ecef;
    }
    #pdfCanvas {
      display: block;
      margin: 0 auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      cursor: crosshair;
    }
    .pdf-element {
      position: absolute;
      border: 2px dashed #2563eb;
      background: rgba(37, 99, 235, 0.1);
      cursor: move;
      min-width: 50px;
      min-height: 20px;
    }
    .pdf-element.selected {
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
    }
    .pdf-element input,
    .pdf-element textarea {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      padding: 0;
      font-size: 14px;
      resize: none;
      font-family: inherit;
    }
    .element-controls {
      position: absolute;
      top: -30px;
      right: 0;
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pdf-element:hover .element-controls {
      opacity: 1;
    }
    .control-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .delete-btn {
      background: #ef4444;
    }
    .delete-btn:hover {
      background: #dc2626;
    }
    .resize-handle {
      position: absolute;
      bottom: -5px;
      right: -5px;
      width: 15px;
      height: 15px;
      background: #2563eb;
      border: 2px solid white;
      border-radius: 3px;
      cursor: nwse-resize;
    }
    .signature-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .signature-modal.active {
      display: flex;
    }
    .signature-content {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
    }
    .signature-settings {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }
    #signatureCanvas {
      border: 2px solid #dee2e6;
      cursor: crosshair;
      display: block;
      margin: 10px 0;
      touch-action: none;
      background: white;
    }
    .signature-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>PDF Fill & Sign Tool</h1>
  </div>
  <div class="toolbar toolbar-row1">
    <div class="toolbar-group">
      <label for="fileInput" class="btn btn-primary">📁 Upload PDF</label>
      <input type="file" id="fileInput" accept="application/pdf">
    </div>
    <div class="toolbar-group">
      <button id="undoBtn" class="btn btn-icon" disabled title="Undo (Ctrl+Z)">↩</button>
      <button id="redoBtn" class="btn btn-icon" disabled title="Redo (Ctrl+Y)">↪</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="addTextBtn" class="btn btn-secondary" disabled title="Add Text (T)">T Text</button>
      <button id="addSignatureBtn" class="btn btn-secondary" disabled title="Sign (S)">✍ Sign</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="arrowBtn" class="btn btn-icon" disabled title="Arrow (A)">→</button>
      <button id="rectBtn" class="btn btn-icon" disabled title="Rectangle (R)">□</button>
      <button id="circleBtn" class="btn btn-icon" disabled title="Circle (C)">○</button>
      <button id="freehandBtn" class="btn btn-icon" disabled title="Freehand (D)">✏</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="downloadBtn" class="btn btn-success" disabled>⬇ Download</button>
      <button id="clearSaveBtn" class="btn btn-icon" disabled title="Clear saved session for this file">🗑</button>
    </div>
    <div id="modeBadge" class="mode-badge">● SELECT</div>
  </div>
  <div class="toolbar toolbar-row2">
    <div class="toolbar-group" id="formattingGroup">
      <select id="fontFamily" class="toolbar-select" disabled>
        <option value="Arial">Arial</option>
        <option value="Helvetica">Helvetica</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
      </select>
      <button id="boldBtn" class="btn btn-icon" disabled title="Bold"><strong>B</strong></button>
      <button id="italicBtn" class="btn btn-icon btn-italic" disabled title="Italic"><em>I</em></button>
      <input type="number" id="fontSize" value="14" min="8" max="72" class="toolbar-number" disabled>
      <input type="color" id="textColor" value="#000000" class="toolbar-color" disabled>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <span style="font-size:12px;color:#555;flex-shrink:0;">Shape:</span>
      <input type="color" id="shapeColor" value="#ef4444" class="toolbar-color" disabled>
      <input type="number" id="shapeWidth" value="2" min="1" max="20" class="toolbar-number" disabled title="Line width (px)">
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="zoomOutBtn" class="btn btn-icon" disabled title="Zoom out">−</button>
      <span id="zoomDisplay" class="zoom-display">—</span>
      <button id="zoomInBtn" class="btn btn-icon" disabled title="Zoom in">+</button>
      <button id="fitBtn" class="btn btn-secondary btn-sm" disabled title="Fit to width">⊡ Fit</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="firstPage" class="btn btn-icon" disabled title="First page">◀◀</button>
      <button id="prevPage" class="btn btn-icon" disabled title="Previous page (Ctrl+←)">◀</button>
      <input type="number" id="pageInput" value="1" min="1" class="toolbar-number page-input" disabled>
      <span id="pageTotal" class="page-total">/ 0</span>
      <button id="nextPage" class="btn btn-icon" disabled title="Next page (Ctrl+→)">▶</button>
      <button id="lastPage" class="btn btn-icon" disabled title="Last page">▶▶</button>
    </div>
  </div>
  <div class="canvas-container" id="canvasContainer">
    <div id="emptyState" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#6c757d;font-size:18px;pointer-events:none;z-index:1;">
      Upload a PDF to get started
    </div>
    <canvas id="pdfCanvas"></canvas>
  </div>
</div>

<div class="signature-modal" id="signatureModal">
  <div class="signature-content">
    <h3>Draw Your Signature</h3>
    <div class="signature-settings">
      <label>
        Line Width: <input type="number" id="sigLineWidth" value="2" min="1" max="10">
      </label>
      <label>
        Color: <input type="color" id="sigColor" value="#000000">
      </label>
    </div>
    <canvas id="signatureCanvas" width="500" height="200"></canvas>
    <div class="signature-actions">
      <button id="clearSignature" class="btn btn-secondary">Clear</button>
      <button id="cancelSignature" class="btn btn-secondary">Cancel</button>
      <button id="saveSignature" class="btn btn-success">Save</button>
    </div>
  </div>
</div>

<span id="pageInfo" style="display:none"></span>
<div id="toast"></div>
<script type="module" src="./js/main.js?v=5"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
</script>
</body>
</html>
